# https://www.beekeeperstudio.io/blog/how-to-use-mariadb-with-docker

version: '3'

services:
  # redis-stack (no OSS), con JSON (y más cosas)
  redis:
    image: "redis/redis-stack:latest"
    ports:
      - "6380:6379"
    # environment:
    #   - "REDIS_ARGS=--appendonly yes"
    volumes:
      - ./data:/data
#    deploy:
#      replicas: 1
#      restart_policy:
#        condition: on-failure

  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - 8123:8123
    volumes:
      - clickhouse-data-volume:/var/lib/clickhouse/
      - clickhouse-logs-volume:/var/lib/clickhouse-server/

  mongo:
    image: mongo:latest
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: pass
    volumes:
      - mongo_data:/data/db

  mariadb:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mariadbdata:/var/lib/mysql
      - ./mariadb:/docker-entrypoint-initdb.d


volumes:
  mariadbdata:
  mongo_data:
  clickhouse-data-volume:
  clickhouse-logs-volume:
